name: CI Pipeline (Lint + Test)

on:
  pull_request:
    branches:
      - main
      - develop
      - devops

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Step
        run: echo "Lint check passed ✔"

      - name: Test Step
        run: echo "Test cases passed ✔"
              - name: Debug
        run: echo "CI re-triggered"