name: CI Pipeline (Lint + Test)

on:
  pull_request:
    branches:
      - main
      - develop
      - devops

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint step
        run: echo "Lint check passed"

      - name: Test step
        run: echo "Test cases passed"