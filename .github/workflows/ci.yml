name: CI Pipeline (Lint + Test)

on:
  pull_request:
    branches:
      - main
      - develop
      - devops

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install

      - name: Run Lint
        run: |
          echo "Running lint check..."
          npm run lint || echo "Lint not configured yet"

      - name: Run Tests
        run: |
          echo "Running test cases..."
          npm test || echo "Tests not configured yet"